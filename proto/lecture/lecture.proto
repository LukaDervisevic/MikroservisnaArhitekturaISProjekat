syntax = "proto3";

package lecture;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

import "proto/lecturer/lecturer.proto";
import "proto/event/event.proto";

option go_package = "github.com/LukaDervisevic/MikroservisnaArhitekturaISProjekat/proto/lecture";

message Lecture {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
    string name = 4;
    google.protobuf.Duration duration = 5;
}

message CreateLectureRequest {
    lecturer.Lecturer lecturer = 1;
    event.Event event = 2;
    string name = 3;
    google.protobuf.Duration duration = 4;
}


message CreateLectureResponse {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
    string name = 4;
    google.protobuf.Duration duration = 5;
}

message GetLectureRequest {
    string lecture_name = 1;
}

message GetLecturesRequest {

}
 
message GetLectureResponse {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
    string name = 4;
    google.protobuf.Duration duration = 5;
}

message UpdateLectureRequest {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
    string name = 4;
    google.protobuf.Duration duration = 5;
}

message DeleteLectureRequest {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
}

message DeleteLectureResponse {
    int64 id = 1;
    lecturer.Lecturer lecturer = 2;
    event.Event event = 3;
    string name = 4;
    google.protobuf.Duration duration = 5;
}

service LectureService {
    rpc CreateLecture(CreateLectureRequest) returns (CreateLectureResponse) {}
    rpc GetLectureByName(GetLectureRequest) returns (GetLectureResponse) {}
    rpc UpdateLecture(UpdateLectureRequest) returns (google.protobuf.Empty) {}
    rpc DeleteLecture(DeleteLectureRequest) returns (DeleteLectureResponse) {}
    rpc GetLectures(GetLecturesRequest) returns (stream GetLectureResponse) {}
    
}