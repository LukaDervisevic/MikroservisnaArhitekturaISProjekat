syntax = "proto3";

package event;

import "google/type/datetime.proto";
import "google/protobuf/empty.proto";
import "proto/location/location.proto";

option go_package = "github.com/LukaDervisevic/MikroservisnaArhitekturaISProjekat/proto/event";

message Event {
    int64 id = 1;
    string name = 2;
    float cotisation_price = 3;
    string agenda = 4;
    string type = 5;
    google.type.DateTime date_time = 6;
    location.Location location = 7;
}

message EventName {
    string name = 1;
}

service EventService {
    rpc CreateEvent(Event) returns (google.protobuf.Empty) {}
    rpc GetEventByName(EventName) returns (Event) {}
    rpc UpdateEvent(Event) returns (Event) {}
}




