services:
  event-service:
    container_name: event-service
    build:
      context: ./
      dockerfile: ./event-service/Dockerfile
    depends_on:
      - mais-db
    ports:
      - "50054:50054"
    env_file:
      - ./event-service/.env.local
    networks:
      - mais-backend

  lecturer-service:
    container_name: lecturer-service
    build:
      context: ./
      dockerfile: ./lecturer-service/Dockerfile
    depends_on:
      - mais-db
    ports:
      - "50055:50055"
    env_file:
      - ./lecturer-service/.env.local
    networks:
      - mais-backend
  
  mais-db:
    container_name: mais-db
    image: postgres:17.7-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./.env.compose
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mais-backend
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $$POSTGRES_USER -d event_service_db && pg_isready -U $$POSTGRES_USER -d lecturer_service_db"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:

networks:
  mais-backend:
    driver: bridge